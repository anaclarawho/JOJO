<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#dbe9ff">
    <title>JOJO | Plataforma Educativa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.css?v=20260406-2">
</head>
<body>
    <div class="app-shell">
        <main class="app-screen">
            <header class="brand-hero">
                <img
                    class="brand-hero__logo"
                    src="./assets/jojo-eyes-logo.png"
                    alt="Logo JOJO"
                >
                <div class="brand-hero__copy">
                    <p class="brand-hero__eyebrow">Plataforma de jogos e ferramentas assistivas</p>
                    <h1>JOJO</h1>
                </div>
            </header>

            <section class="home-actions" aria-label="Acesso rápido da plataforma">
                <button class="home-action" type="button" data-section="games">Jogos</button>
                <button class="home-action" type="button" data-section="tools">Ferramentas de apoio</button>
                <button class="home-action" type="button" data-section="freeReading">Leitura livre</button>
                <button class="home-action home-action--about" type="button" data-section="about">Sobre</button>
            </section>
        </main>

        <div id="sheetBackdrop" class="sheet-backdrop hidden"></div>

        <section
            id="appSheet"
            class="app-sheet"
            aria-hidden="true"
            aria-labelledby="sheetTitle"
        >
            <div class="sheet-handle" aria-hidden="true"></div>

            <header class="sheet-header">
                <div>
                    <p id="sheetEyebrow" class="sheet-header__eyebrow"></p>
                    <h2 id="sheetTitle"></h2>
                </div>
                <button id="sheetCloseBtn" class="icon-button" type="button" aria-label="Fechar painel">×</button>
            </header>

            <div id="sheetTabs" class="sheet-tabs hidden" role="tablist" aria-label="Categorias da seção"></div>
            <div id="sheetContent" class="sheet-content"></div>
        </section>
    </div>

    <script src="./scripts/data.js?v=20260406-2"></script>
    <script src="./scripts/app.js?v=20260406-2"></script>
</body>
</html>
