<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#d8e8ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JOJO">
    <title>JOJO | TIMER</title>
    <link rel="manifest" href="../../manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="../../assets/icon-192.png">
    <link rel="apple-touch-icon" href="../../assets/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="app-shell">
        <button id="soundToggleBtn" class="ghost-button ghost-button--pill sound-toggle" type="button" aria-pressed="true">🔊 Som ligado</button>

        <div id="homeScreen" class="screen screen--home">
            <div class="top-actions">
                <a class="ghost-button ghost-button--pill" href="../../">Voltar à JOJO</a>
                <button id="openInfoBtn" class="ghost-button ghost-button--pill" type="button">Como funciona</button>
            </div>

            <header class="hero">
                <div class="brand">
                    <img src="./assets/jojo-eyes-logo.png" alt="Logo JOJO" class="brand__logo">
                    <div class="brand__copy">
                        <p class="eyebrow">JOJO</p>
                        <h1>TIMER</h1>
                    </div>
                </div>
            </header>

            <section class="choice-section">
                <div class="section-heading">
                    <h2>ESCOLHA O TIPO DE TIMER</h2>
                </div>

                <div class="mode-grid">
                    <button class="mode-card mode-card--lanche" type="button" data-mode="lanche">
                        <span class="mode-card__emoji">🍎</span>
                        <strong>TÁ QUASE NA HORA DO LANCHINHO</strong>
                    </button>

                    <button class="mode-card mode-card--casa" type="button" data-mode="casa">
                        <span class="mode-card__emoji">🏠</span>
                        <strong>TÁ QUASE NA HORA DE IR PARA CASA</strong>
                    </button>
                </div>
            </section>

            <section id="setupCard" class="surface-card setup-card hidden" aria-live="polite">
                <div class="setup-card__header">
                    <div>
                        <p id="setupEyebrow" class="eyebrow"></p>
                        <h2 id="setupTitle"></h2>
                        <p id="setupSubtitle" class="section-text"></p>
                    </div>
                    <button id="changeModeBtn" class="text-link-button" type="button">Trocar tipo</button>
                </div>

                <div class="input-grid">
                    <label class="time-field" for="hoursInput">
                        <span>Horas</span>
                        <input id="hoursInput" type="number" min="0" max="8" inputmode="numeric" placeholder="0">
                    </label>

                    <label class="time-field" for="minutesInput">
                        <span>Minutos</span>
                        <input id="minutesInput" type="number" min="0" max="59" inputmode="numeric" placeholder="15">
                    </label>
                </div>

                <div class="preview-panel">
                    <div class="preview-panel__time">
                        <span class="preview-panel__label">Tempo digitado</span>
                        <strong id="timePreview">00:15:00</strong>
                    </div>
                    <p id="validationMessage" class="preview-panel__hint"></p>
                </div>

                <button id="startTimerBtn" class="primary-button" type="button" disabled>Começar timer</button>
            </section>
        </div>

        <div id="timerScreen" class="screen screen--timer hidden">
            <div class="top-actions top-actions--timer">
                <button id="backHomeBtn" class="ghost-button ghost-button--pill" type="button">Voltar</button>
                <button id="openInfoTimerBtn" class="ghost-button ghost-button--pill" type="button">Como funciona</button>
            </div>

            <header class="timer-header">
                <p id="timerModeEyebrow" class="eyebrow"></p>
                <h2 id="timerModeTitle"></h2>
                <p id="timerStatusText" class="timer-status-text"></p>
            </header>

            <section id="journeyCard" class="surface-card journey-card">
                <div class="journey-card__top">
                    <div>
                        <span class="mini-label">Tempo restante</span>
                        <strong id="countdownValue" class="countdown-value">00:15:00</strong>
                    </div>
                    <div class="progress-badge hidden" aria-hidden="true">
                        <span class="mini-label">Progresso</span>
                        <strong id="progressPercent">0%</strong>
                    </div>
                </div>

                <div class="journey-scene">
                    <div class="journey-track">
                        <div id="journeyMilestones" class="journey-milestones"></div>
                        <div id="journeyBasePath" class="journey-path"></div>
                        <div id="journeyProgress" class="journey-path journey-path--progress"></div>
                        <div id="studentMarker" class="student-marker">
                            <img src="./assets/crianca.gif" alt="Estudante caminhando">
                        </div>
                        <div class="destination-marker">
                            <img id="destinationAsset" src="" alt="">
                            <span id="destinationLabel"></span>
                        </div>
                    </div>
                </div>

                <div class="journey-card__bottom">
                    <p id="journeyMessage" class="journey-message"></p>
                    <div class="time-split">
                        <article class="time-split__card hidden" aria-hidden="true">
                            <span class="mini-label">Total</span>
                            <strong id="totalTimeValue">00:15:00</strong>
                        </article>
                        <article class="time-split__card">
                            <span class="mini-label">Já passou</span>
                            <strong id="elapsedTimeValue">00:00:00</strong>
                        </article>
                    </div>
                </div>
            </section>

            <div class="controls">
                <button id="pauseBtn" class="control-button control-button--pause" type="button">⏸️ Pausar</button>
                <button id="resumeBtn" class="control-button control-button--resume" type="button" disabled>▶️ Continuar</button>
                <button id="resetBtn" class="control-button control-button--reset" type="button">🔄 Recomeçar</button>
                <button id="newTimerBtn" class="control-button control-button--back" type="button">✨ Novo timer</button>
            </div>
        </div>

        <div id="finishScreen" class="screen screen--finish hidden">
            <div class="finish-card">
                <p class="eyebrow">CHEGOU A HORA</p>
                <div id="finishEmoji" class="finish-card__emoji"></div>
                <div id="finishVisuals" class="finish-card__visuals hidden"></div>
                <h2 id="finishTitle"></h2>
                <p id="finishText" class="finish-card__text"></p>
                <span id="finishBadge" class="finish-card__badge"></span>
                <div class="finish-card__actions">
                    <button id="finishNewTimerBtn" class="primary-button" type="button">✨ Criar novo timer</button>
                    <button id="finishSameModeBtn" class="ghost-button" type="button">🔁 Usar o mesmo tipo</button>
                </div>
            </div>
        </div>

        <div id="infoModal" class="modal hidden" aria-hidden="true">
            <div class="modal__backdrop"></div>
            <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
                <div class="modal__header">
                    <div>
                        <p class="eyebrow">Informações</p>
                        <h2 id="infoTitle">Como funciona</h2>
                    </div>
                    <button id="closeInfoBtn" class="icon-button" type="button" aria-label="Fechar">×</button>
                </div>

                <div class="modal__content">
                    <div id="aboutParagraphs" class="about-copy"></div>
                    <ul id="aboutBullets" class="bullet-list"></ul>
                    <p id="aboutFooter" class="about-footer"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
    <script src="../../scripts/pwa.js"></script>
</body>
</html>
